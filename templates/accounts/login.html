<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#0b1120;
            color:white;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            background:#172033;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:30px;
        }

        input{
            margin-bottom:15px;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <h2>
            Student Login
        </h2>

        <form method="POST">

            {% csrf_token %}

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Username"
                required
            >

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Password"
                required
            >

            <button
                type="submit"
                class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <hr>

        <p class="text-center">

            Don't have an account?

            <a href="/accounts/register/">
                Register
            </a>

        </p>

    </div>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Student Login - SmartLearn AI
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

        *{
            font-family: 'Poppins', sans-serif;
        }

        body{
            background: #0b1120;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-card{
            width: 480px;
            background: #172033;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .form-label{
            color: #d1d5db;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .form-control{
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
            font-size: 14px;
        }

        .form-control:focus{
            background-color: rgba(255, 255, 255, 0.08);
            border-color: #7B3FF2;
            color: white;
            box-shadow: 0 0 0 4px rgba(123, 63, 242, 0.25);
            outline: none;
        }

        .form-control::placeholder{
            color: #6b7280;
        }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus{
            -webkit-text-fill-color: white;
            -webkit-box-shadow: 0 0 0px 1000px #172033 inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-primary{
            background: linear-gradient(90deg, #7B3FF2, #5B8CFF);
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-weight: 600;
            margin-top: 15px;
            width: 100%;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-primary:hover{
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(123, 63, 242, 0.4);
            background: linear-gradient(90deg, #6a33d8, #4a7ae6);
        }

        hr{
            border-color: rgba(255, 255, 255, 0.1);
            margin: 25px 0;
        }

        .auth-footer{
            text-align: center;
            color: #d1d5db;
            font-size: 14px;
            margin-bottom: 0;
        }

        .auth-footer a{
            color: #5B8CFF;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
            margin-left: 5px;
        }

        .auth-footer a:hover{
            color: #7B3FF2;
        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 60px; height: 60px; background: linear-gradient(135deg, rgba(123, 63, 242, 0.2), rgba(91, 140, 255, 0.2)); color: #AFC6FF;">
                <i class="fa-solid fa-graduation-cap fs-3"></i>
            </div>
            <h2 class="fw-bold mb-1">Student Login</h2>
            <p class="text-secondary small mb-0">Welcome back to SmartLearn AI</p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="Enter your username"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                >
            </div>

            <button
                type="submit"
                class="btn btn-primary w-100">

                Login

            </button>

        </form>

        <hr>

        <p class="auth-footer">
            Don't have an account?
            <a href="/accounts/register/">
                Register
            </a>
        </p>

    </div>

</body>

</html>

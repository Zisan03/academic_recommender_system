<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <i class="fas fa-graduation-cap"></i>
    </div>

    <h2>
      SmartLearn
      <span>AI Recommender</span>
    </h2>
  </div>

  <nav class="sidebar-menu">
    <a
      href="{% url 'home' %}"
      class="{% if request.path == '/' %}active{% endif %}"
    >
      <i class="fas fa-house"></i>

      <span>Home</span>
    </a>

    <a
      href="{% url 'recommendations' %}"
      class="{% if '/recommendations' in request.path %}active{% endif %}"
    >
      <i class="fas fa-robot"></i>

      <span>AI Recommendations</span>
    </a>

    <a
      href="{% url 'resource_list' %}"
      class="{% if '/resources' in request.path and '/activity' not in request.path and '/manage' not in request.path %}active{% endif %}"
    >
      <i class="fas fa-book-open"></i>

      <span>Learning Resources</span>
    </a>

    <a
      href="{% url 'activity' %}"
      class="{% if '/activity' in request.path %}active{% endif %}"
    >
      <i class="fas fa-chart-line"></i>

      <span>Learning Activity</span>
    </a>

    <a
      href="{% url 'profile' %}"
      class="{% if '/accounts/profile' in request.path %}active{% endif %}"
    >
      <i class="fas fa-user"></i>

      <span>My Profile</span>
    </a>

    <a
      href="{% url 'settings' %}"
      class="{% if '/accounts/settings' in request.path %}active{% endif %}"
    >
      <i class="fas fa-gear"></i>

      <span>Settings</span>
    </a>

    {% if request.user.is_staff or request.user.is_superuser %}
    <a
      href="{% url 'admin_portal' %}"
      class="{% if '/resources/manage' in request.path %}active{% endif %}"
      style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: 8px; padding-top: 14px;"
    >
      <i class="fas fa-user-shield" style="color: #38BDF8;"></i>

      <span>Admin Portal</span>
    </a>
    {% endif %}
  </nav>

  <div class="sidebar-bottom">
    <a href="{% url 'logout' %}">
      <i class="fas fa-right-from-bracket"></i>

      <span>Logout</span>
    </a>
  </div>
</aside>
